{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Letter For Yogi Ma ❤️</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI',sans-serif;
        }

        body {
            background: linear-gradient(135deg,#ffd6e7,#ff9db5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating Hearts */

        .heart {
            position: fixed;
            bottom: -50px;
            pointer-events: none;
            animation: floatUp linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {

            0% {
                transform: translateY(0) scale(.5);
                opacity: 0;
            }

            15% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) scale(1.3) rotate(360deg);
                opacity: 0;
            }
        }

        /* Letter */

        .letter {
            width: 760px;
            height: 85vh;
            background: white;
            border-radius: 25px;
            padding: 35px;
            overflow-y: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,.25);
            position: relative;
            z-index: 2;
        }

            .letter::-webkit-scrollbar {
                width: 8px;
            }

            .letter::-webkit-scrollbar-thumb {
                background: #ff4d6d;
                border-radius: 20px;
            }

        h1 {
            text-align: center;
            color: #ff4d6d;
            margin-bottom: 30px;
            font-size: 42px;
        }

        #text {
            font-size: 22px;
            line-height: 40px;
            color: #444;
            white-space: pre-wrap;
        }

        .next {
            margin-top: 35px;
            text-align: center;
        }

        button {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: #ff4d6d;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: .3s;
        }

            button:hover {
                transform: scale(1.08);
            }
    </style>

</head>

<body>
    <audio id="bgMusic" autoplay loop>
        <source src="{% static 'music/letter.mp3' %}" type="audio/mpeg">
    </audio>
    <script>
        const music = document.getElementById("bgMusic");
        music.volume = 0.5;

        window.addEventListener("load", () => {
            music.play().catch(() => { });
        });

        document.body.addEventListener("click", () => {
            music.play();
        }, { once: true });
    </script>
    <div class="letter">

        <h1>💌 Dear Yogi Ma ❤️</h1>

        <p id="text"></p>

        <div class="next">

            <a href="{% url 'gallery' %}">
                <button>📸 Next ➜ Gallery</button>
            </a>

        </div>

    </div>

    <script>

        // Floating Hearts

        function createHeart() {

            const heart = document.createElement("div");

            heart.className = "heart";

            const hearts = ["❤️", "💖", "💕", "💗"];

            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            heart.style.left = Math.random() * 100 + "vw";

            heart.style.fontSize = (20 + Math.random() * 25) + "px";

            heart.style.animationDuration = (5 + Math.random() * 5) + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 10000);

        }

        setInterval(createHeart, 250);


        // Letter

        const message = `💌 Dear Yogi Ma ❤️

Happy Birthday, Yogi Ma! 🎂🥳

Today is your special day, and I truly hope it becomes one of the most beautiful and unforgettable days of your life.

You are not just my little sister; you are one of the most precious people in my life. Your smile always brings happiness to everyone around you, especially to me. So, keep smiling because your smile makes the world brighter. 😊❤️

No matter what challenges life brings, never be afraid to face them. You are stronger than you think. Believe in yourself, stay confident, and keep moving forward. I truly believe that one day all your dreams will come true.

I pray that God blesses you with endless happiness, good health, success, peace, love, and countless beautiful moments throughout your life. 🙏❤️

On this special day, forget all your worries and simply enjoy every single moment. Laugh a little louder, smile a little longer, and create memories that will stay with you forever.

Always remember this...

You are never alone.
I will always be there for you, no matter what.

Stay kind.
Stay happy.
Stay blessed.

🎂 Happy Birthday Once Again, Yogi Ma! ❤️

May this year bring you new dreams to chase, new opportunities to grow, and countless reasons to smile every single day.

Thank you for being the wonderful sister you are. I feel lucky to have you in my life, and I will always be proud of you.

Keep believing in yourself, keep shining, and never stop being the amazing person you are.

❤️ "Nee eppovum thaniya illa...

Naan eppovum un kooda irupen." ❤️

With Lots of Love,

Moni ❤️Reshu`;

        let i = 0;

        function typeWriter() {

            if (i < message.length) {

                document.getElementById("text").innerHTML += message.charAt(i);

                i++;

                setTimeout(typeWriter, 35);

            }

        }

        typeWriter();

    </script>

</body>
</html>
